baseURL = "https://bupd.xyz/"
languageCode = "en-us"
title = "Prasanth Baskar"
copyright = "Copyright (c) 2026 Prasanth Baskar"
enableRobotsTXT = true
summaryLength = 28

[params]
  description = "Prasanth Baskar writes about open source, Kubernetes, Harbor, platform engineering, Linux, and developer tools."
  author = "Prasanth Baskar"
  handle = "bupd"
  avatar = "https://avatars.githubusercontent.com/u/89722848?v=4"
  github = "https://github.com/bupd"
  devto = "https://dev.to/bupd"
  hashnode = "https://bupd.hashnode.dev/"
  twitter = "https://twitter.com/prasanthbupd"
  email = "mailto:bupdprasanth@gmail.com"
  linkedin = "https://www.linkedin.com/in/prasanth-baskar/"

[mediaTypes]
  [mediaTypes."application/atom+xml"]
    suffixes = ["xml"]

[outputFormats]
  [outputFormats.Atom]
    mediaType = "application/atom+xml"
    baseName = "feed"
    isPlainText = true
    notAlternative = false

[permalinks]
  blogs = "/blogs/:slug/"

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "ATOM", "JSON"]
  section = ["HTML", "RSS", "ATOM"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[services]
  [services.rss]
    limit = 20

[menus]
  [[menus.main]]
    name = "Blogs"
    pageRef = "/blogs"
    weight = 10
  [[menus.main]]
    name = "Archive"
    pageRef = "/archive"
    weight = 12
  [[menus.main]]
    name = "Projects"
    pageRef = "/projects"
    weight = 15
  [[menus.main]]
    name = "Talks"
    pageRef = "/talks"
    weight = 18
  [[menus.main]]
    name = "About"
    pageRef = "/about"
    weight = 20
  [[menus.main]]
    name = "Now"
    pageRef = "/now"
    weight = 25
  [[menus.main]]
    name = "Resume"
    pageRef = "/resume"
    weight = 26
  [[menus.main]]
    name = "Search"
    pageRef = "/search"
    weight = 28
  [[menus.main]]
    name = "RSS"
    url = "/feed.xml"
    weight = 30
