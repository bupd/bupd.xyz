<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
{{ with .OutputFormats.Get "RSS" }}<link rel="alternate" type="application/rss+xml" title="{{ site.Title }} RSS" href="{{ .Permalink }}">{{ end }}
<link rel="alternate" type="application/json" title="{{ site.Title }} search index" href="/index.json">
<link rel="search" type="application/opensearchdescription+xml" title="{{ site.Title }}" href="/opensearch.xml">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="/css/site.css">
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ $image := site.Params.avatar }}
{{ with .Params.youtube_id }}{{ $image = printf "https://i.ytimg.com/vi/%s/hqdefault.jpg" . }}{{ end }}
<meta property="og:image" content="{{ $image }}">
<meta name="twitter:card" content="summary_large_image">
{{ partial "jsonld.html" . }}
