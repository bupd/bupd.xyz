{{ define "main" }}
  <header class="page-header">
    <p class="section-label">All writing</p>
    <h1 class="page-title">Archive</h1>
    <p class="page-description">Every published post, newest first.</p>
  </header>

  <section class="article">
    <div class="archive">
      {{ range (where site.RegularPages "Section" "blogs").GroupByDate "2006" }}
        <section class="archive__year">
          <h2 class="archive__heading">{{ .Key }}</h2>
          <ul class="archive__list">
            {{ range .Pages }}
              <li class="archive__item">
                <time class="archive__date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02" }}</time>
                <a class="archive__link" href="{{ .RelPermalink }}">{{ .Title }}</a>
              </li>
            {{ end }}
          </ul>
        </section>
      {{ end }}
    </div>
  </section>
{{ end }}
