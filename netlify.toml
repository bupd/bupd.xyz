[build]
  command = "hugo --gc --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.147.9"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/rss.xml"
  to = "/feed.xml"
  status = 301

[[redirects]]
  from = "/blog/:slug"
  to = "/blogs/:slug/"
  status = 301

[[redirects]]
  from = "/posts/:slug"
  to = "/blogs/:slug/"
  status = 301

[[redirects]]
  from = "/bupd/:slug"
  to = "/blogs/:slug/"
  status = 301

[[redirects]]
  from = "/manufacutring-software-like-chips"
  to = "/blogs/manufacutring-software-like-chips/"
  status = 301

[[redirects]]
  from = "/manufacturing-software-like-chips"
  to = "/blogs/manufacutring-software-like-chips/"
  status = 301
